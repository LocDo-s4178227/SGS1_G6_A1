<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Automatically generated overview of all public pages, modules, forum threads, and blog content on Rshop.">
  <title>HTML Sitemap - Rshop</title>
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="sitemap.css">
</head>
<body class="with-rshop-nav">
<header class="rshop-top-header">
  <div class="rshop-header-container">
    <div class="rshop-logo-section">
      <a href="../shopping_cart/cart.html" class="rshop-cart-icon" aria-label="Cart">&#128722;</a>
      <a href="../homepage/homepage.html" class="rshop-logo">Rshop</a>
    </div>
    <nav class="rshop-nav" aria-label="Main navigation">
      <a href="../homepage/homepage.html" class="rshop-nav-link">Home</a>
      <a href="../shopping_cart/products.html" class="rshop-nav-link">Market</a>
      <a href="../Blog/blog-list.html" class="rshop-nav-link">Blog</a>
      <a href="../discuss_forum/forum.html" class="rshop-nav-link">Forum</a>
      <a href="../discuss_forum/wishlist.html" class="rshop-nav-link">Wishlist</a>
      <a href="../shopping_cart/cart.html" class="rshop-nav-link">Cart</a>
      <a href="../Product_Review_Rating/review.html" class="rshop-nav-link">Review</a>
      <a href="../discuss_forum/create-thread.html" class="rshop-nav-link">Post</a>
      <a href="../user_account/profile.html" class="rshop-nav-link">Profile</a>
      <a href="sitemap.html" class="rshop-nav-link active" aria-current="page">Sitemap</a>
      <a href="../user_account/auth.html" class="rshop-nav-link">Sign In</a>
    </nav>
  </div>
</header>

<section class="sitemap-hero">
  <div class="sitemap-hero-inner">
    <h1>Website Sitemap</h1>
    <p>A visual, clickable overview of every discovered HTML page and its internal content links. The data is generated by scanning the project, rather than manually maintaining a list.</p>
  </div>
</section>

<main class="sitemap-main">
  <div class="sitemap-toolbar">
    <label>
      <span class="sr-only" style="position:absolute;left:-9999px">Search sitemap</span>
      <input id="sitemapSearch" class="sitemap-search" type="search" placeholder="Search pages, modules, threads or posts..." autocomplete="off">
    </label>
    <div id="sitemapSummary" class="sitemap-summary" aria-live="polite">Loading sitemap…</div>
  </div>

  <ul id="moduleJumpList" class="module-jump-list" aria-label="Jump to module"></ul>
  <div id="sitemapContent"></div>
  <p id="generatedNote" class="generated-note"></p>
</main>

<script src="sitemap-data.js"></script>
<script>
(function () {
  'use strict';

  const data = window.SITEMAP_DATA;
  const content = document.getElementById('sitemapContent');
  const search = document.getElementById('sitemapSearch');
  const summary = document.getElementById('sitemapSummary');
  const jumpList = document.getElementById('moduleJumpList');
  const generatedNote = document.getElementById('generatedNote');

  if (!data || !Array.isArray(data.modules)) {
    content.innerHTML = '<div class="empty-state">Sitemap data could not be loaded. Run <code>python generate_sitemap.py</code> in the sitemap folder.</div>';
    summary.textContent = 'Sitemap unavailable';
    return;
  }

  const escapeHtml = value => String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');

  const moduleId = name => 'module-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

  function render(filterText = '') {
    const query = filterText.trim().toLowerCase();
    let shownPages = 0;
    let visibleModules = 0;
    const moduleMarkup = [];
    const jumpMarkup = [];

    data.modules.forEach(module => {
      const matchingPages = module.pages.filter(page => {
        const linksText = (page.links || []).map(link => link.text + ' ' + link.target).join(' ');
        const haystack = [module.name, page.title, page.heading, page.description, page.path, page.type, linksText].join(' ').toLowerCase();
        return !query || haystack.includes(query);
      });

      if (!matchingPages.length) return;
      visibleModules += 1;
      shownPages += matchingPages.length;
      const id = moduleId(module.name);
      jumpMarkup.push(`<li><a href="#${id}">${escapeHtml(module.name)} (${matchingPages.length})</a></li>`);

      const cards = matchingPages.map(page => {
        const validLinks = (page.links || []).filter(link => link.exists && link.target !== page.path);
        const brokenLinks = (page.links || []).filter(link => !link.exists);
        const allLinks = [...validLinks, ...brokenLinks];
        const linkList = allLinks.length ? `
          <details class="content-links">
            <summary>${allLinks.length} discovered internal link${allLinks.length === 1 ? '' : 's'}</summary>
            <ul>
              ${allLinks.map(link => {
                const href = '../' + link.target + (link.fragment ? '#' + link.fragment : '');
                return link.exists
                  ? `<li><a href="${escapeHtml(href)}">${escapeHtml(link.text)}</a></li>`
                  : `<li class="broken-link">${escapeHtml(link.text)} — missing: ${escapeHtml(link.target)}</li>`;
              }).join('')}
            </ul>
          </details>` : '';

        return `
          <article class="sitemap-card" data-search="${escapeHtml([module.name, page.title, page.heading, page.path].join(' ').toLowerCase())}">
            <div class="sitemap-card-top">
              <h3><a href="${escapeHtml(page.url)}">${escapeHtml(page.heading || page.title)}</a></h3>
              <span class="page-type">${escapeHtml(page.type)}</span>
            </div>
            ${page.description ? `<p class="sitemap-description">${escapeHtml(page.description)}</p>` : ''}
            <small class="sitemap-path">${escapeHtml(page.path)}</small>
            ${linkList}
          </article>`;
      }).join('');

      moduleMarkup.push(`
        <section id="${id}" class="sitemap-module">
          <div class="sitemap-module-heading">
            <h2>${escapeHtml(module.name)}</h2>
            <span>${matchingPages.length} page${matchingPages.length === 1 ? '' : 's'}</span>
          </div>
          <div class="sitemap-grid">${cards}</div>
        </section>`);
    });

    content.innerHTML = moduleMarkup.length
      ? moduleMarkup.join('')
      : '<div class="empty-state">No pages or content links match your search.</div>';
    jumpList.innerHTML = jumpMarkup.join('');
    summary.textContent = `${shownPages} of ${data.pageCount} pages across ${visibleModules} module${visibleModules === 1 ? '' : 's'}`;
  }

  search.addEventListener('input', event => render(event.target.value));
  generatedNote.textContent = `Automatically generated ${new Date(data.generatedAt).toLocaleString()} • ${data.brokenLinkCount} unresolved internal link${data.brokenLinkCount === 1 ? '' : 's'} detected`;
  render();
})();
</script>
</body>
</html>
