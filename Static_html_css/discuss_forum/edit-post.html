<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit the details of your custom-make request.">
    <title>Edit Request - Custom Makers Marketplace</title>
    <link rel="stylesheet" href="../css/shopping_module_style.css">
    <link rel="stylesheet" href="css/discussion_forum.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">🔨 Custom Makers Board</div>
            <nav>
                <a href="../shopping_cart/products.html">Market</a>
                <a href="../Blog/blog-list.html">Blog</a>
                <a href="forum.html" class="active">Forum Board</a>
                <a href="wishlist.html">Wishlist</a>
                <a href="../shopping_cart/cart.html">Cart</a>
                <a href="create-thread.html">Post Request</a>
                <a href="../shopping_cart/profile.html">Profile</a>
            </nav>
        </div>
    </header>

    <main class="container-sm">
        <div class="card">
            <h1>Edit Your Request</h1>

            <form action="thread-detail.html" method="POST" class="mt-1">
                <div class="form-group">
                    <label for="edit-title">Request Title</label>
                    <input type="text" id="edit-title" name="title" value="Need a custom ergonomic wooden desk" required>
                </div>

                <div class="form-group">
                    <label for="edit-content">Description &amp; Requirements</label>
                    <textarea id="edit-content" name="content" rows="6" required>I'm looking for a carpenter or design student who can build an L-shaped wooden desk for my home office. I need it to be exactly 160cm x 120cm to fit my corner space. Solid wood preferred, open to material suggestions like oak or walnut. Budget is around $400.</textarea>
                </div>

                <div class="form-group">
                    <label for="edit-image">Update Reference Image</label>
                    <img class="current-image-preview" src="../images/ergonomic_wooden_desk.png" alt="Reference sketch of the requested corner desk">
                        <div>
                            <input type="file" id="edit-image" name="image" accept="image/*">
                            <small class="form-text text-muted">Choose a new image to replace the current reference sketch (optional).</small>
                </div>

                <div class="flex-between">
                    <a href="thread-detail.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save All Changes</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Custom Makers Marketplace</p>
    </footer>
</body>
</html>
