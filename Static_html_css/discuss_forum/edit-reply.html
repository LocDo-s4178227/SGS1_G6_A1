<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit your reply or offer on a custom-make request.">
    <title>Edit Reply - Custom Makers Marketplace</title>
    <link rel="stylesheet" href="../css/shopping_module_style.css">
    <link rel="stylesheet" href="css/discussion_forum.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">🔨 Custom Makers Board</div>
            <nav>
                <a href="../shopping_cart/products.html">Market</a>
                <a href="../Blog/blog-list.html">Blog</a>
                <a href="forum.html" class="active">Forum Board</a>
                <a href="wishlist.html">Wishlist</a>
                <a href="../shopping_cart/cart.html">Cart</a>
                <a href="create-thread.html">Post Request</a>
                <a href="../shopping_cart/auth.html">Profile</a>
            </nav>
        </div>
    </header>

    <main class="container-sm">
        <div class="card">
            <h1>Edit Your Reply</h1>
            <p class="meta-info mb-1">Editing your offer on: <strong>Need a custom ergonomic wooden desk</strong></p>

            <form action="thread-detail.html" method="POST" class="mt-1">
                <div class="form-group">
                    <label for="edit-reply-title">Reply Title</label>
                    <input type="text" id="edit-reply-title" name="reply_title" value="Re: Can build this in solid oak" required>
                </div>

                <div class="form-group">
                    <label for="edit-reply-content">Reply Content</label>
                    <textarea id="edit-reply-content" name="reply_content" rows="4" required>Hi Alex, I'm an industrial design student and have access to the workshop. I can definitely build this using solid oak. Would you be open to a digital 3D mockup first?</textarea>
                </div>

                <div class="form-group">
                    <label for="edit-reply-image">Attach / Replace Image (Optional)</label>
                    <input type="file" id="edit-reply-image" name="reply_image" accept="image/*">
                </div>

                <div class="flex-between">
                    <a href="thread-detail.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Reply Changes</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Custom Makers Marketplace</p>
    </footer>
</body>
</html>
