<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/shopping_module_style.css">
    <link rel="stylesheet" href="css/discussion_forum.css">
    <link rel="stylesheet" href="../css/top-nav.css">
</head>
<body class="with-rshop-nav">
<header class="rshop-top-header">
    <div class="rshop-header-container">
        <div class="rshop-logo-section">
            <a href="../shopping_cart/cart.html" class="rshop-cart-icon" aria-label="Cart">&#128722;</a>
            <a href="../homepage/homepage.html" class="rshop-logo">Rshop</a>
        </div>
        <nav class="rshop-nav" aria-label="Main navigation">
            <a href="../homepage/homepage.html" class="rshop-nav-link">Home</a>
            <a href="../shopping_cart/products.html" class="rshop-nav-link">Market</a>
            <a href="../Blog/blog-list.html" class="rshop-nav-link">Blog</a>
            <a href="../discuss_forum/forum.html" class="rshop-nav-link">Forum</a>
            <a href="../discuss_forum/wishlist.html" class="rshop-nav-link">Wishlist</a>
            <a href="../shopping_cart/cart.html" class="rshop-nav-link">Cart</a>
            <a href="../Product_Review_Rating/review.html" class="rshop-nav-link">Review</a>
            <a href="../discuss_forum/create-thread.html" class="rshop-nav-link">Post</a>
            <a href="../user_account/profile.html" class="rshop-nav-link">Profile</a>
            <a href="../user_account/auth.html" class="rshop-nav-link">Sign In</a>
        </nav>
    </div>
</header>
    

    <main class="container-sm">
        <div class="card">
            <h1>Edit Your Reply</h1>
            <p class="meta-info mb-1">Editing your offer on: <strong>Need a custom ergonomic wooden desk</strong></p>

            <form action="thread-detail.html" method="POST" class="mt-1">
                <div class="form-group">
                    <label for="edit-reply-author"> Author</label>
                    <input type="text" id="edit-reply-author" name="reply_author" value="MakerJohn" required>
                </div>

                <div class="form-group">
                    <label for="edit-reply-timestamp">Reply Date &amp; Time</label>
                    <input type="datetime-local" id="edit-reply-timestamp" name="reply_timestamp" value="2026-10-25T11:15" required>
                </div>

                <div class="form-group">
                    <label for="edit-reply-title">Reply Title</label>
                    <input type="text" id="edit-reply-title" name="reply_title" value="Re: Can build this in solid oak" required>
                </div>

                <div class="form-group">
                    <label for="edit-reply-content">Reply Content</label>
                    <textarea id="edit-reply-content" name="reply_content" rows="4" required>Hi Alex, I'm an industrial design student and have access to the workshop. I can definitely build this using solid oak. Would you be open to a digital 3D mockup first?</textarea>
                </div>

                <div class="form-group">
                    <label for="edit-reply-image">Attach / Replace Image (Optional)</label>
                    <input type="file" id="edit-reply-image" name="reply_image" accept="image/*">
                </div>

                <div class="flex-between">
                    <a href="thread-detail.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Reply Changes</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Custom Makers Marketplace</p>
    </footer>
</body>
</html>
