<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new forum post with author and timestamp details.">
    <title>Create Thread - Custom Makers Marketplace</title>
    <link rel="stylesheet" href="../css/shopping_module_style.css">
    <link rel="stylesheet" href="css/discussion_forum.css">
    <link rel="stylesheet" href="../css/top-nav.css">
</head>
<body class="with-rshop-nav">
<header class="rshop-top-header">
    <div class="rshop-header-container">
        <div class="rshop-logo-section">
            <a href="../shopping_cart/cart.html" class="rshop-cart-icon" aria-label="Cart">&#128722;</a>
            <a href="../homepage/homepage.html" class="rshop-logo">Rshop</a>
        </div>
        <nav class="rshop-nav" aria-label="Main navigation">
            <a href="../homepage/homepage.html" class="rshop-nav-link">Home</a>
            <a href="../shopping_cart/products.html" class="rshop-nav-link">Market</a>
            <a href="../Blog/blog-list.html" class="rshop-nav-link">Blog</a>
            <a href="../discuss_forum/forum.html" class="rshop-nav-link">Forum</a>
            <a href="../discuss_forum/wishlist.html" class="rshop-nav-link">Wishlist</a>
            <a href="../shopping_cart/cart.html" class="rshop-nav-link">Cart</a>
            <a href="../Product_Review_Rating/review.html" class="rshop-nav-link">Review</a>
            <a href="../discuss_forum/create-thread.html" class="rshop-nav-link">Post</a>
            <a href="../user_account/profile.html" class="rshop-nav-link">Profile</a>
            <a href="../user_account/auth.html" class="rshop-nav-link">Sign In</a>
        </nav>
    </div>
</header>
    

    <main class="container-sm">
        <div class="card">
            <h1>Create Your Post</h1>

            <form action="thread-detail.html" method="POST" class="mt-1">
                <div class="form-group">
                    <label for="post-author">Author</label>
                    <input type="text" id="post-author" name="author" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="post-timestamp">Posted Date &amp; Time</label>
                    <input type="datetime-local" id="post-timestamp" name="posted_at" required>
                </div>

                <div class="form-group">
                    <label for="edit-title">Post Title</label>
                    <input type="text" id="edit-title" name="title" value="Need a custom ergonomic wooden desk" required>
                </div>

                <div class="form-group">
                    <label for="edit-content">Description &amp; Requirements</label>
                    <textarea id="edit-content" name="content" rows="6" required>I'm looking for a carpenter or design student who can build an L-shaped wooden desk for my home office. I need it to be exactly 160cm x 120cm to fit my corner space. Solid wood preferred, open to material suggestions like oak or walnut. Budget is around $400.</textarea>
                </div>

                <div class="form-group">
                    <label for="edit-image">Reference Image</label>
                    <img class="current-image-preview" src="../images/ergonomic_wooden_desk.png" alt="Reference sketch of the requested corner desk">
                </div>
                <div class="form-group">
                    <input type="file" id="edit-image" name="image" accept="image/*">
                </div>

                <div class="flex-between">
                    <a href="thread-detail.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Thread</button>
                </div>
            </form>
        </div>
    </main>
    <script>
        (function() {
            var timestampInput = document.getElementById('post-timestamp');
            if (timestampInput && !timestampInput.value) {
                var now = new Date();
                var local = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
                timestampInput.value = local;
            }
        })();
    </script>

    <footer>
        <p>&copy; 2026 Custom Makers Marketplace</p>
    </footer>
</body>
</html>
